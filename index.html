<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>submit one – Bauprojektmanager</title>
  <meta name="theme-color" content="#0f1830" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="submit one" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <img class="brand-img" src="logo.png" alt="submit one"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
        <span class="brand-fallback" style="display:none">submit<b>one</b></span>
        <img class="brand-icon" src="icon.svg" alt="submit one" />
      </div>
      <button class="sidebar-toggle" id="btnCollapse" title="Menü ein-/ausklappen" aria-label="Menü ein-/ausklappen">«</button>
      <nav class="nav" id="mainNav">
        <a href="#/dashboard" data-nav="dashboard" title="Dashboard"><span class="nav-ico">▦</span> <span class="nav-txt">Dashboard</span></a>
        <a href="#/projekte"  data-nav="projekte" title="Projekte"><span class="nav-ico">▤</span> <span class="nav-txt">Projekte</span></a>
        <div id="projSubnav" class="subnav"></div>
        <a href="#/kalender"  data-nav="kalender" title="Kalender"><span class="nav-ico">🗓</span> <span class="nav-txt">Kalender</span></a>
        <a href="#/drucken"   data-nav="drucken" title="Drucken"><span class="nav-ico">🖨</span> <span class="nav-txt">Drucken</span></a>
        <a href="#/honorar"   data-nav="honorar" title="Honorar-Rechner"><span class="nav-ico">∑</span> <span class="nav-txt">Honorar</span></a>
        <a href="#/kontakte"  data-nav="kontakte" title="Kontakte"><span class="nav-ico">☎</span> <span class="nav-txt">Kontakte</span></a>
        <a href="#/dokumente" data-nav="dokumente" title="Dokumente"><span class="nav-ico">✉</span> <span class="nav-txt">Dokumente</span></a>
        <a href="#/einstellungen" data-nav="einstellungen" title="Einstellungen"><span class="nav-ico">⚙</span> <span class="nav-txt">Einstellungen</span></a>
      </nav>
      <div class="sidebar-foot">
        <div class="user-chip" id="userChip" hidden></div>
        <button class="btn-ghost-sm" id="btnExport">Export</button>
        <button class="btn-ghost-sm" id="btnReset">Demo&nbsp;laden</button>
        <div class="ver">Prototyp · v0.1</div>
      </div>
    </aside>

    <main class="content">
      <div id="view"></div>
    </main>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
