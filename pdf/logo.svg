<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1240" width="1240" height="1240" font-family="'Questrial','Century Gothic','Futura','Inter',sans-serif">
  <rect width="1240" height="1240" fill="#ffffff"/>

  <!-- Bildmarke: S liegt auf dem Dokument; oben rechts der Knick (gefaltete Blattecke) -->
  <g transform="translate(-46 -230) scale(6)" fill="none" stroke-linejoin="round">
    <!-- gefaltete Blattecke (Knick) oben rechts -->
    <path d="M126 78 L162 50 L162 78 Z" fill="#5a7d3c" stroke="none"/>
    <path d="M126 78 L162 50" stroke="#cfe0b6" stroke-width="2" stroke-linecap="round"/>
    <!-- S – Top leicht weiter rechts, Boden leicht weiter links; Enden gerade -->
    <path d="M122 66 L84 66 C62 66 60 92 86 104 C108 112 116 118 116 136 C116 158 92 166 72 162 L112 162"
          stroke="#1c242c" stroke-width="12" stroke-linecap="butt"/>
    <!-- grüner Aufwärts-Pfeil (geschwungener Fuss) -->
    <path d="M112 162 C128 162 134 153 134 140 L134 110" stroke="#5a7d3c" stroke-width="11" stroke-linecap="round"/>
    <path d="M124 124 L134 109 L144 124" stroke="#5a7d3c" stroke-width="11" stroke-linecap="round"/>
  </g>

  <!-- Wortmarke -->
  <text x="620" y="905" text-anchor="middle" font-size="128" letter-spacing="30" font-weight="300">
    <tspan fill="#3a3f3a">SUBMIT</tspan><tspan fill="#a7a89b" dx="50">PDF</tspan>
  </text>
  <text x="620" y="967" text-anchor="middle" font-size="32" letter-spacing="2" font-style="italic" fill="#34502b">„It's all about the Paper, submit to everyone."</text>
  <text x="620" y="1009" text-anchor="middle" font-size="25" letter-spacing="5" fill="#6e7a3a">— YANICK GERBER</text>
</svg>
