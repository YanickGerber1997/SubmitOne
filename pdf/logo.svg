<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1240" width="1240" height="1240" font-family="'Questrial','Century Gothic','Futura','Inter',sans-serif">
  <rect width="1240" height="1240" fill="#ffffff"/>

  <!-- Bildmarke -->
  <g transform="translate(300 180) scale(3.0)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- S: runder Kopf (links eingerollt) + flacher Boden-Balken (dunkel) -->
    <path d="M120 64 C96 58 72 62 68 86 C65 104 90 110 98 114 C116 121 116 130 114 142 C110 163 86 171 68 162" stroke="#1c242c" stroke-width="12"/>
    <path d="M70 165 L114 165" stroke="#1c242c" stroke-width="12"/>
    <!-- grüner Aufwärts-Pfeil (heller), geschwungener Fuss -->
    <path d="M114 165 C131 165 136 155 136 142 L136 112" stroke="#5a7d3c" stroke-width="11"/>
    <path d="M126 126 L136 111 L146 126" stroke="#5a7d3c" stroke-width="11"/>
    <!-- grünes Blatt (spitz, gewinkelt) mit Mittelrippe -->
    <path d="M116 95 C112 69 138 52 159 57 C155 83 135 101 116 95 Z" fill="#3e5a30" stroke="none"/>
    <path d="M122 88 L151 63" stroke="#ffffff" stroke-width="2.2"/>
  </g>

  <!-- Wortmarke (dünn, weit gesperrt) -->
  <text x="620" y="950" text-anchor="middle" font-size="128" letter-spacing="30" font-weight="300">
    <tspan fill="#3a3f3a">SUBMIT</tspan><tspan fill="#a7a89b" dx="50">PDF</tspan>
  </text>
  <text x="620" y="1012" text-anchor="middle" font-size="32" letter-spacing="2" font-style="italic" fill="#34502b">„It's all about the Paper, submit to everyone."</text>
  <text x="620" y="1054" text-anchor="middle" font-size="25" letter-spacing="5" fill="#6e7a3a">— YANICK GERBER</text>
</svg>
