<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Submit Paper</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="icon" href="../icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="write.css" />
</head>
<body data-theme="light">

  <div id="app" class="app">

    <!-- LINKE SEITENLEISTE -->
    <aside class="side" id="side">
      <div class="side-brand">
        <span class="brand-word"><span class="bw-a">Submit</span><span class="bw-b">Paper</span></span>
        <button class="icon-btn side-collapse" id="btnSideCollapse" title="Seitenleiste einklappen">«</button>
      </div>

      <button class="new-doc" id="btnNew" title="Neues Dokument (Strg+N)">
        <svg viewBox="0 0 24 24" class="i"><path d="M12 5v14M5 12h14"/></svg>
        <span>Neues Dokument</span>
      </button>

      <nav class="side-nav" id="sideNav">
        <button class="snav active" data-folder="dokumente"><svg viewBox="0 0 24 24" class="i"><path d="M6 2.5h8l4 4v15H6z"/><path d="M14 2.5v4h4"/></svg><span>Dokumente</span></button>
        <button class="snav" data-folder="favoriten"><svg viewBox="0 0 24 24" class="i"><path d="M12 3.5l2.6 5.3 5.9.9-4.3 4.2 1 5.9-5.2-2.8-5.2 2.8 1-5.9L3.5 9.7l5.9-.9z"/></svg><span>Favoriten</span></button>
        <button class="snav" data-folder="zuletzt"><svg viewBox="0 0 24 24" class="i"><circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3.2 1.9"/></svg><span>Zuletzt verwendet</span></button>
        <button class="snav" data-folder="vorlagen"><svg viewBox="0 0 24 24" class="i"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg><span>Vorlagen</span></button>
        <button class="snav" data-folder="archiv"><svg viewBox="0 0 24 24" class="i"><rect x="3" y="4" width="18" height="5" rx="1.5"/><path d="M5 9v11h14V9M9.5 13h5"/></svg><span>Archiv</span></button>
        <button class="snav" data-folder="papierkorb"><svg viewBox="0 0 24 24" class="i"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg><span>Papierkorb</span></button>
      </nav>

      <div class="side-list" id="sideList"><!-- Dokumentenliste --></div>

      <div class="side-foot">
        <button class="foot-link" id="btnTheme" title="Hell / Dunkel">
          <svg viewBox="0 0 24 24" class="i" id="themeIco"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
          <span id="themeLbl">Dunkel</span>
        </button>
        <div class="ver">Submit Paper · <span id="verTag">v1</span></div>
      </div>
    </aside>

    <!-- MITTE -->
    <main class="main">
      <!-- OBERE LEISTE -->
      <header class="topbar" id="topbar">
        <button class="icon-btn topbar-side" id="btnSideShow" title="Seitenleiste">☰</button>
        <div class="mode-switch" id="modeSwitch">
          <button class="mode-pill" id="modePill" title="Modus wechseln: Schreiben, Tabelle, Folien">
            <span class="mode-ico" id="modeIco">✍</span>
            <span class="mode-name" id="modeName">Submit Write</span>
            <span class="caret">▾</span>
          </button>
          <div class="menu mode-menu" id="modeMenu" hidden>
            <button data-mode="write"><span class="mi">✍</span><span class="mm-t">Submit Write</span><span class="mm-sub">Dokument</span></button>
            <button data-mode="calc"><span class="mi">▦</span><span class="mm-t">Submit Calc</span><span class="mm-sub">Tabelle</span></button>
            <button data-mode="slides"><span class="mi">▭</span><span class="mm-t">Submit Slides</span><span class="mm-sub">Folien · bald</span></button>
          </div>
        </div>
        <input class="doc-title" id="docTitle" value="Unbenanntes Dokument" spellcheck="false" />
        <div class="save-state" id="saveState" title="Speicherstatus">
          <span class="dot"></span><span class="lbl">Gespeichert</span>
        </div>
        <div class="topbar-right">
          <button class="ghost-btn" id="btnOpen" title="Öffnen (Strg+O)"><svg viewBox="0 0 24 24" class="i"><path d="M3 7h6l2 2h10v9a2 2 0 0 1-2 2H3z"/></svg><span>Öffnen</span></button>
          <button class="ghost-btn" id="btnSave" title="Speichern (Strg+S)"><svg viewBox="0 0 24 24" class="i"><path d="M5 3h11l3 3v15H5z"/><path d="M8 3v6h7M8 21v-7h8v7"/></svg><span>Speichern</span></button>
          <div class="menu-wrap">
            <button class="ghost-btn" id="btnExport" title="Exportieren"><svg viewBox="0 0 24 24" class="i"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg><span>Export</span></button>
            <div class="menu" id="exportMenu" hidden>
              <button data-export="pdf">Als PDF (Drucken)</button>
              <button data-export="html">Als HTML</button>
              <button data-export="md">Als Markdown</button>
              <button data-export="docx">Als DOCX (Beta)</button>
            </div>
          </div>
          <button class="icon-btn" id="btnPreview" title="Druckvorschau"><svg viewBox="0 0 24 24" class="i"><path d="M6 9V3h12v6"/><rect x="4" y="9" width="16" height="8" rx="1.5"/><path d="M7 17h10v4H7z"/></svg></button>
          <button class="icon-btn" id="btnInspector" title="Dokument-Infos (Gliederung, Zeilenabstand, Statistik)"><svg viewBox="0 0 24 24" class="i"><path d="M4 5h16v14H4z"/><path d="M15 5v14"/></svg></button>
          <button class="icon-btn" id="btnFocus" title="Fokusmodus (Strg+Umschalt+F)"><svg viewBox="0 0 24 24" class="i"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></button>
        </div>
      </header>

      <!-- FORMAT-LEISTE (Ribbon, kompakt – Word-Stil) -->
      <div class="formatbar ribbon" id="formatbar">

        <div class="rib-group">
          <div class="rib-body">
            <select class="fb-sel wide" id="selBlock" title="Absatz-Stil – Titel, Überschriften oder Fliesstext">
              <option value="p">Fliesstext</option>
              <option value="h1">Titel (H1)</option>
              <option value="h2">Überschrift (H2)</option>
              <option value="h3">Unterüberschrift (H3)</option>
              <option value="blockquote">Zitat</option>
              <option value="pre">Codeblock</option>
            </select>
          </div>
          <div class="rib-cap">Stil</div>
        </div>

        <div class="rib-group">
          <div class="rib-body col">
            <div class="rib-row">
              <select class="fb-sel" id="selFont" title="Schriftart">
                <option value="'Inter', sans-serif">Inter</option>
                <option value="'Lora', serif">Lora</option>
                <option value="Georgia, serif">Georgia</option>
                <option value="'Times New Roman', serif">Times</option>
                <option value="'Courier New', monospace">Courier</option>
              </select>
              <select class="fb-sel narrow" id="selSize" title="Schriftgrösse">
                <option>10</option><option>12</option><option>14</option><option selected>16</option><option>18</option><option>20</option><option>24</option><option>28</option><option>32</option><option>40</option><option>48</option>
              </select>
              <button class="fb-btn sm" id="fontGrow" title="Schrift vergrössern">A▴</button>
              <button class="fb-btn sm" id="fontShrink" title="Schrift verkleinern">A▾</button>
            </div>
            <div class="rib-row">
              <button class="fb-btn sm" data-cmd="bold" title="Fett (Strg+B)"><b>B</b></button>
              <button class="fb-btn sm" data-cmd="italic" title="Kursiv (Strg+I)"><i>I</i></button>
              <button class="fb-btn sm" data-cmd="underline" title="Unterstrichen (Strg+U)"><u>U</u></button>
              <button class="fb-btn sm" data-cmd="strikeThrough" title="Durchgestrichen"><s>S</s></button>
              <button class="fb-btn sm" data-cmd="subscript" title="Tiefgestellt">x<sub>2</sub></button>
              <button class="fb-btn sm" data-cmd="superscript" title="Hochgestellt">x<sup>2</sup></button>
              <label class="fb-btn sm color" title="Textfarbe"><span class="ca">A</span><input type="color" id="inkColor" value="#1d2330" /></label>
              <label class="fb-btn sm color hl" title="Textmarker (Hintergrundfarbe)"><span class="ca">A</span><input type="color" id="hlColor" value="#ffe066" /></label>
              <button class="fb-btn sm" id="btnClear" title="Formatierung der Auswahl entfernen"><svg viewBox="0 0 24 24" class="i"><path d="M6 5h12M9 5l-2 14M13 5l1 7M5 19h7M16 13l5 5M21 13l-5 5"/></svg></button>
            </div>
          </div>
          <div class="rib-cap">Schrift</div>
        </div>

        <div class="rib-group">
          <div class="rib-body col">
            <div class="rib-row">
              <button class="fb-btn sm" data-cmd="insertUnorderedList" title="Aufzählung"><svg viewBox="0 0 24 24" class="i"><circle cx="5" cy="7" r="1.4"/><circle cx="5" cy="12" r="1.4"/><circle cx="5" cy="17" r="1.4"/><path d="M9 7h11M9 12h11M9 17h11"/></svg></button>
              <button class="fb-btn sm" data-cmd="insertOrderedList" title="Nummerierung"><svg viewBox="0 0 24 24" class="i"><path d="M9 7h11M9 12h11M9 17h11M4 6v3M4 9h1.5M3.5 13h2l-2 3h2"/></svg></button>
              <button class="fb-btn sm" data-cmd="outdent" title="Einzug verkleinern"><svg viewBox="0 0 24 24" class="i"><path d="M20 6H9M20 12h-7M20 18H9M7 9l-3 3 3 3"/></svg></button>
              <button class="fb-btn sm" data-cmd="indent" title="Einzug vergrössern"><svg viewBox="0 0 24 24" class="i"><path d="M4 6h11M4 12h7M4 18h11M17 9l3 3-3 3"/></svg></button>
              <select class="fb-sel narrow" id="selLine" title="Zeilenabstand">
                <option value="1.0">1.0</option><option value="1.15">1.15</option><option value="1.4">1.4</option><option value="1.7" selected>1.7</option><option value="2.1">2.1</option>
              </select>
            </div>
            <div class="rib-row">
              <button class="fb-btn sm" data-cmd="justifyLeft" title="Linksbündig"><svg viewBox="0 0 24 24" class="i"><path d="M4 6h16M4 10h10M4 14h16M4 18h10"/></svg></button>
              <button class="fb-btn sm" data-cmd="justifyCenter" title="Zentriert"><svg viewBox="0 0 24 24" class="i"><path d="M4 6h16M7 10h10M4 14h16M7 18h10"/></svg></button>
              <button class="fb-btn sm" data-cmd="justifyRight" title="Rechtsbündig"><svg viewBox="0 0 24 24" class="i"><path d="M4 6h16M10 10h10M4 14h16M10 18h10"/></svg></button>
              <button class="fb-btn sm" data-cmd="justifyFull" title="Blocksatz"><svg viewBox="0 0 24 24" class="i"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg></button>
            </div>
          </div>
          <div class="rib-cap">Absatz</div>
        </div>

        <div class="rib-group">
          <div class="rib-body">
            <button class="rib-btn" data-ins="image" title="Bild einfügen"><svg viewBox="0 0 24 24" class="i"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.6"/><path d="M21 16l-5-5L5 20"/></svg><span>Bild</span></button>
            <button class="rib-btn" data-ins="table" title="Tabelle einfügen"><svg viewBox="0 0 24 24" class="i"><rect x="4" y="5" width="16" height="14" rx="1.5"/><path d="M4 10h16M4 15h16M10 5v14M16 5v14"/></svg><span>Tabelle</span></button>
            <button class="rib-btn" data-ins="link" title="Link einfügen"><svg viewBox="0 0 24 24" class="i"><path d="M10 13a4 4 0 0 0 6 .5l2-2a4 4 0 0 0-6-6l-1 1M14 11a4 4 0 0 0-6-.5l-2 2a4 4 0 0 0 6 6l1-1"/></svg><span>Link</span></button>
            <button class="rib-btn" data-ins="toc" title="Inhaltsverzeichnis"><svg viewBox="0 0 24 24" class="i"><path d="M9 6h11M9 12h11M9 18h11M4 6h.01M4 12h.01M4 18h.01"/></svg><span>Inhalt</span></button>
            <div class="menu-wrap">
              <button class="rib-btn" id="btnInsertMore" title="Mehr einfügen"><svg viewBox="0 0 24 24" class="i"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg><span>Mehr</span></button>
              <div class="menu" id="insertMenu" hidden>
                <button data-ins="hr"><span class="mi">—</span> Trennlinie</button>
                <span class="menu-sep"></span>
                <button data-ins="header"><span class="mi">⊤</span> Kopfzeile bearbeiten</button>
                <button data-ins="footer"><span class="mi">⊥</span> Fusszeile bearbeiten</button>
              </div>
            </div>
          </div>
          <div class="rib-cap">Einfügen</div>
        </div>

      </div>

      <!-- SEITEN-REITER (Navigator) -->
      <div class="pagetabs" id="pagetabs"></div>

      <!-- SUCHLEISTE -->
      <div class="findbar" id="findbar" hidden>
        <svg viewBox="0 0 24 24" class="i"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="findInput" placeholder="Im Dokument suchen …" spellcheck="false" />
        <span class="find-count" id="findCount"></span>
        <button class="icon-btn sm" id="findPrev" title="Zurück (Umschalt+Enter)">‹</button>
        <button class="icon-btn sm" id="findNext" title="Weiter (Enter)">›</button>
        <button class="icon-btn sm" id="findClose" title="Schliessen (Esc)">✕</button>
      </div>

      <!-- LINEAL -->
      <div class="ruler-wrap" id="rulerWrap"><div class="ruler" id="ruler"></div></div>

      <!-- DOKUMENT -->
      <div class="canvas" id="canvas">
        <div class="page" id="page">
          <div class="zone zone-h" id="zoneH" contenteditable="true" data-ph="Kopfzeile – erscheint beim Drucken auf jeder Seite"></div>
          <div class="editor" id="editor" contenteditable="true" spellcheck="true"></div>
          <div class="zone zone-f" id="zoneF" contenteditable="true" data-ph="Fusszeile – erscheint beim Drucken auf jeder Seite"></div>
          <div class="guides" id="guides" aria-hidden="true"></div>
          <div class="vruler" id="vruler" aria-hidden="true"></div>
          <div class="page-format" id="pageFormat" aria-hidden="true">A4 · 210 × 297 mm</div>
        </div>
      </div>

      <!-- TABELLE (Submit Calc) -->
      <div class="calc" id="calc">
        <div class="calc-bar">
          <span class="cell-ref" id="cellRef">A1</span>
          <span class="fx">fx</span>
          <input class="formula-input" id="formulaInput" placeholder="Wert oder =Formel, z. B. =SUMME(A1:A5)  ·  =A1*B2" spellcheck="false" />
          <span class="grow"></span>
          <button class="fb-btn sm" id="calcAddRow" title="Zeile hinzufügen">+ Zeile</button>
          <button class="fb-btn sm" id="calcAddCol" title="Spalte hinzufügen">+ Spalte</button>
        </div>
        <div class="calc-scroll" id="calcScroll" tabindex="0"><table class="grid" id="grid"></table></div>
      </div>

      <!-- STATUSLEISTE -->
      <footer class="statusbar" id="statusbar">
        <span id="stWords">0 Wörter</span>
        <span id="stChars">0 Zeichen</span>
        <span id="stPars">0 Absätze</span>
        <span id="stPages">1 Seite</span>
        <span class="grow"></span>
        <select class="status-sel" id="selFormat" title="Papierformat">
          <option>A4</option><option>A3</option><option>A2</option><option>A1</option><option>A0</option>
        </select>
        <div class="seg orient" title="Seitenausrichtung">
          <button id="btnPortrait" class="on" title="Hochformat">▯ Hoch</button>
          <button id="btnLandscape" title="Querformat">▭ Quer</button>
        </div>
        <div class="zoombox">
          <button class="icon-btn sm" id="zoomOut" title="Verkleinern (Strg −)">−</button>
          <button class="zoom-val" id="zoomVal" title="Auf Fensterbreite anpassen">100&nbsp;%</button>
          <button class="icon-btn sm" id="zoomIn" title="Vergrössern (Strg +)">+</button>
        </div>
        <span id="stRead">0 Min. Lesezeit</span>
      </footer>
    </main>

    <!-- RECHTE SEITENLEISTE (Inspector) -->
    <aside class="inspector" id="inspector">
      <div class="insp-head">
        <span>Dokument</span>
        <button class="icon-btn" id="btnInspClose" title="Schliessen">›</button>
      </div>
      <div class="insp-body">
        <div class="insp-block">
          <div class="insp-lbl">Gliederung</div>
          <div class="outline" id="outline"><p class="muted">Noch keine Überschriften.</p></div>
        </div>
        <div class="insp-block">
          <div class="insp-lbl">Zeilenabstand</div>
          <div class="seg" id="segLine">
            <button data-line="1.4">Eng</button>
            <button data-line="1.7" class="on">Normal</button>
            <button data-line="2.1">Weit</button>
          </div>
        </div>
        <div class="insp-block">
          <div class="insp-lbl">Seite einrichten</div>
          <div class="setup-grid">
            <label><span class="cap">Rand oben</span><span class="val"><input type="number" id="mTop" min="0" max="60" step="1">mm</span></label>
            <label><span class="cap">Rand unten</span><span class="val"><input type="number" id="mBottom" min="0" max="60" step="1">mm</span></label>
            <label><span class="cap">Rand links</span><span class="val"><input type="number" id="mLeft" min="0" max="60" step="1">mm</span></label>
            <label><span class="cap">Rand rechts</span><span class="val"><input type="number" id="mRight" min="0" max="60" step="1">mm</span></label>
            <label><span class="cap">Kopf-Höhe</span><span class="val"><input type="number" id="kopfH" min="6" max="80" step="1">mm</span></label>
            <label><span class="cap">Fuss-Höhe</span><span class="val"><input type="number" id="fussH" min="6" max="80" step="1">mm</span></label>
          </div>
          <button class="setup-reset" id="setupReset">Auf Standard zurücksetzen</button>
        </div>
        <div class="insp-block">
          <div class="insp-lbl">Statistik</div>
          <div class="stat-grid" id="statGrid"></div>
        </div>
      </div>
    </aside>

  </div>

  <!-- FOKUS-EXIT -->
  <button class="focus-exit" id="btnFocusExit" title="Fokus verlassen (Esc)" hidden>
    <svg viewBox="0 0 24 24" class="i"><path d="M9 4H4v5M15 4h5v5M9 20H4v-5M15 20h5v-5"/></svg>
  </button>

  <!-- SCHWEBE-TOOLBAR (Auswahl) -->
  <div class="bubble" id="bubble" hidden>
    <button class="bb" data-cmd="bold" title="Fett"><b>B</b></button>
    <button class="bb" data-cmd="italic" title="Kursiv"><i>I</i></button>
    <button class="bb" data-cmd="underline" title="Unterstrichen"><u>U</u></button>
    <button class="bb" id="bbHl" title="Markieren"><span class="bb-hl">A</span></button>
    <button class="bb" id="bbLink" title="Link"><svg viewBox="0 0 24 24" class="i"><path d="M10 13a4 4 0 0 0 6 .5l2-2a4 4 0 0 0-6-6l-1 1M14 11a4 4 0 0 0-6-.5l-2 2a4 4 0 0 0 6 6l1-1"/></svg></button>
  </div>

  <!-- TABELLEN-WERKZEUGE -->
  <div class="tabletools" id="tabletools" hidden>
    <button data-tt="row+" title="Zeile darunter">+ Zeile</button>
    <button data-tt="col+" title="Spalte rechts">+ Spalte</button>
    <button data-tt="row-" title="Zeile löschen">− Zeile</button>
    <button data-tt="col-" title="Spalte löschen">− Spalte</button>
    <button data-tt="del" title="Tabelle löschen">🗑</button>
  </div>

  <!-- RECHTSKLICK-MENÜ -->
  <div class="ctxmenu" id="ctxmenu" hidden></div>

  <!-- DRUCKVORSCHAU -->
  <div class="preview-overlay" id="previewOverlay" hidden>
    <div class="preview-bar">
      <span class="pv-title">Druckvorschau</span>
      <span id="pvInfo" class="pv-info"></span>
      <span class="grow"></span>
      <button class="ghost-btn" id="pvPrint"><svg viewBox="0 0 24 24" class="i"><path d="M6 9V3h12v6"/><rect x="4" y="9" width="16" height="8" rx="1.5"/><path d="M7 17h10v4H7z"/></svg><span>Drucken / PDF</span></button>
      <button class="icon-btn" id="pvClose" title="Schliessen (Esc)">✕</button>
    </div>
    <div class="preview-scroll" id="previewScroll"></div>
  </div>

  <input type="file" id="imgInput" accept="image/*" hidden />
  <div id="toast-root"></div>

  <script src="write.js"></script>
</body>
</html>
